n bisa mendapatkan informasi terkait periode pendaftaran, status pendaftaran, kuota penerima beasiswa, dan info terkait lainnya melalui situs resmi yang ada di Universitas Indonesia ya. Meskipun begitu, beberapa informasi baru bisa diperoleh jika kalian sudah diterima sebagai mahasiswa UI karena situs tersebut membutuhkan akun <em&gt;login</em&gt;. Berikut merupakan gambaran beasiswa yang kalian dapat peroleh jika menjadi mahasiswa UI:</p&gt;<ol&gt;  <li&gt;Beasiswa dari Pemerintah melalui Bidikmisi-Dikti, PPA, LPDP, dll.</li&gt;  <li&gt;Beasiswa dari pihak lain seperti Beasiswa Bank Mandiri 2017, <em&gt;Lotte Scholarship Foundation</em&gt; 2017, Beasiswa Yayasan Mari Lari-Indorunners Jalur Masuk SBMPTN 2017, Beasiswa <em&gt;Computer Science Leaders Scholarship</em&gt; 2017 Jalur Masuk SBMPTN, Beasiswa Yayasan Asahi Glass Indonesia 2017/2018, Beasiswa BNI AM Makara, dll.</li&gt;  <li&gt;Beasiswa dari fakultas juga diberikan melalui kegiatan yang diselenggarakan oleh perkumpulan alumni fakultas tersebut, seperti dari fakultas kedokteran, hukum, atau program beasiswa dari yayasan tertentu.<li&gt;Beasiswa dari universitas meliputi program beasiswa UI, beasiswa paruh waktu, dan bantuan biaya pendidikan.<br /&gt;<br /&gt;</li&gt;</ol&gt;","paid":false,"article_tags":[],"campus_sector":"public_university","profile":{"description":"Sejarah Universitas Indonesia dimulai dari tahun 1849, saat Pemerintah Kolonial Belanda membangun sebuah sekolah tinggi ilmu kesehatan. Nama UI sendiri baru resmi digunakan sejak tahun 1950, itupun masih menggunakan bahasa Belanda, yakni Universiteit Indonesia. Saat ini, UI memiliki 14 fakultas, dengan lebih dari 291 program studi.  \r\n\r\nMenjadi universitas terbaik di Indonesia, menjadikan UI sebagai tujuan favorit untuk melanjutkan pendidikan tinggi. Tingkat persaingan untuk masuk ke UI juga terbilang sangat ketat lho. Setiap tahunnya, rata-rata persentase pendaftar dan diterima untuk program S1 Reguler berada pada kisaran 3%. Kalau kamu men
